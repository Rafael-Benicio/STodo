<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STodo - Desktop Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>STodo Desktop Hub</h1>
                <button id="themeToggle" title="Toggle Dark Mode">🌙</button>
            </div>
            <div id="sync-status">Aguardando servidor...</div>
        </header>

        <nav class="tabs">
            <button id="tabPending" class="active">Pendentes</button>
            <button id="tabCompleted">Concluídas</button>
        </nav>

        <main>
            <section class="task-input">
                <input type="text" id="taskTitle" placeholder="O que precisa ser feito?">
                <button id="addBtn">Adicionar</button>
            </section>

            <section class="task-list">
                <ul id="tasks">
                    <!-- Tarefas aparecerão aqui -->
                </ul>
            </section>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
